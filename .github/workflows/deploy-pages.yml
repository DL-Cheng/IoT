name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to GitHub Pages Branch
        run: |
          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Create and switch to gh-pages branch
          if git rev-parse --verify origin/gh-pages 2>/dev/null; then
            git checkout gh-pages
            git reset --hard origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # Get all files from main branch  
          git checkout main -- . || true
          
          # Remove files that shouldn't be on Pages
          rm -f .gitignore
          rm -rf .github
          
          # Add all files for Pages
          git add -A
          
          # Commit
          git commit -m "Automated deployment to GitHub Pages" --allow-empty
          
          # Force push to gh-pages
          git push -u origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
